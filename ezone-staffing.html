<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ניהול כוח אדם | E-ZONE איזון</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2EC; --card:#FFFFFF; --ink:#1C1B17; --muted:#6E6A5F;
  --line:#D9D5C8; --line-strong:#B6B0A0;
  --accent:#1F5C4D; --accent-soft:#E4EFEA;
  --gold:#A47B2E; --gold-soft:#F3EAD7;
  --danger:#9A2B2B; --danger-soft:#F7E7E7;
  --shadow:0 1px 2px rgba(28,27,23,.04),0 8px 24px rgba(28,27,23,.06);
}
body{font-family:'Heebo',sans-serif;direction:rtl;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:60px}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

.topbar{background:var(--ink);color:#fff;padding:16px 0;position:sticky;top:0;z-index:50}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px}
.brand b{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:20px;letter-spacing:.5px}
.brand span{font-size:12px;color:#B9B4A6;font-weight:500}
.house-switch{display:flex;gap:6px;flex-wrap:wrap}
.house-switch button{background:transparent;border:1px solid #3A382F;color:#CFCABA;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:.15s}
.house-switch button:hover{border-color:#5A574A;color:#fff}
.house-switch button.on{background:#fff;color:var(--ink);border-color:#fff}
.house-switch button.central{background:var(--gold);color:#fff;border-color:var(--gold)}

.head{padding:28px 0 8px}
.head h1{font-family:'Frank Ruhl Libre',serif;font-size:30px;font-weight:900;margin-bottom:4px}
.head p{color:var(--muted);font-size:14px}
.head .mgr{display:inline-block;margin-top:10px;font-size:13px;font-weight:600;background:var(--accent-soft);color:var(--accent);padding:5px 14px;border-radius:999px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.stat .lbl{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px}
.stat .val{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;line-height:1}
.stat .sub{font-size:12px;color:var(--muted);margin-top:6px}
.stat.accent{background:var(--accent);border-color:var(--accent)}
.stat.accent .lbl{color:#BFD8CF}
.stat.accent .val,.stat.accent .sub{color:#fff}

.section{margin:30px 0}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.section-head h2{font-family:'Frank Ruhl Libre',serif;font-size:21px;font-weight:700}
.btn{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:9px 18px;border-radius:9px;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);transition:.15s}
.btn:hover{background:#EEEBE2}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#17483C}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:#EEEBE2;color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}

.tablecard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:760px}
thead th{text-align:right;background:#EFEDE5;color:var(--muted);font-weight:700;font-size:12px;padding:13px 18px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:14px 18px;border-bottom:1px solid #EEEBE2;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FAF8F2}
.emp-name{font-weight:600}
.role-tag{display:inline-block;font-size:12px;font-weight:600;background:#EFEDE5;color:var(--muted);padding:3px 11px;border-radius:999px}
.pct-bar{display:flex;align-items:center;gap:8px}
.pct-track{width:64px;height:7px;background:#E6E3D8;border-radius:99px;overflow:hidden}
.pct-fill{height:100%;background:var(--accent);border-radius:99px}
.money{font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}
.note-cell{font-size:13px;color:var(--muted);max-width:220px}
.row-actions{display:flex;gap:6px;justify-content:flex-start}
.empty{padding:48px 20px;text-align:center;color:var(--muted);font-size:14px}
.cover-flag{display:inline-block;font-size:11px;font-weight:700;background:var(--gold-soft);color:var(--gold);padding:2px 9px;border-radius:999px;margin-left:6px}

.house-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.house-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
.house-box:hover{border-color:var(--line-strong)}
.house-box .hb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.house-box .hb-top b{font-family:'Frank Ruhl Libre',serif;font-size:18px}
.house-box .hb-mgr{font-size:12px;color:var(--muted);font-weight:600}
.hb-stats{display:flex;gap:26px}
.hb-stats div .n{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900}
.hb-stats div .t{font-size:12px;color:var(--muted)}

.hist-item{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid #EEEBE2}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:10px;height:10px;border-radius:99px;background:var(--gold);margin-top:5px;flex-shrink:0}
.hist-body{flex:1}
.hist-body b{font-weight:600}
.hist-meta{font-size:12px;color:var(--muted);margin-top:3px}
.hist-arrow{color:var(--accent);font-weight:700;direction:rtl;display:inline-block}
.hist-reason{font-size:12px;color:var(--gold);font-weight:600;margin-top:3px}

.overlay{position:fixed;inset:0;background:rgba(20,19,16,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-head{padding:22px 24px 0}
.modal-head h3{font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:700}
.modal-head p{font-size:13px;color:var(--muted);margin-top:4px}
.modal-body{padding:20px 24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;font-family:inherit;font-size:14px;padding:10px 13px;border:1px solid var(--line-strong);border-radius:9px;background:#FCFBF7;color:var(--ink);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:64px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:14px 24px 22px;display:flex;gap:10px;justify-content:flex-start}

@media(max-width:760px){
  .stats{grid-template-columns:1fr 1fr}
  .house-grid{grid-template-columns:1fr}
  .head h1{font-size:24px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <div class="brand"><b>E-ZONE</b><span>ניהול כוח אדם</span></div>
    <div class="house-switch" id="houseSwitch"></div>
  </div>
</div>

<div class="wrap" id="app"></div>

<!-- Employee modal -->
<div class="overlay" id="empOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="empModalTitle">עובד חדש</h3>
      <p id="empModalSub"></p>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>שם מלא</label>
        <input id="f_name" type="text" placeholder="שם העובד"/>
      </div>
      <div class="field">
        <label>תפקיד</label>
        <input id="f_role" type="text" placeholder="מטפל / אחות / מנהל בית / אב בית / מטבח"/>
      </div>
      <div class="field-row">
        <div class="field">
          <label>שכר ברוטו חודשי</label>
          <input id="f_salary" type="number" placeholder="0"/>
        </div>
        <div class="field">
          <label>חלקיות משרה באחוזים</label>
          <input id="f_pct" type="number" min="1" max="100" placeholder="100"/>
        </div>
      </div>
      <div class="field">
        <label>הערות</label>
        <textarea id="f_notes" placeholder="לדוגמה מחליפה את רוני שבחל״ת זמני עד סוף מאי"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-primary" onclick="saveEmp()">שמירה</button>
      <button class="btn btn-ghost" onclick="closeEmp()">ביטול</button>
    </div>
  </div>
</div>

<!-- Move modal -->
<div class="overlay" id="moveOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3>העברת עובד בין בתים</h3>
      <p id="moveModalSub"></p>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>מעבר לבית</label>
        <select id="m_house"></select>
      </div>
      <div class="field">
        <label>סיבת המעבר</label>
        <select id="m_reasonType">
          <option value="כיסוי חוסר">כיסוי חוסר — מישהו בחופש או חל״ת או מחלה</option>
          <option value="העברה קבועה">העברה קבועה</option>
          <option value="צורך תפעולי">צורך תפעולי זמני</option>
          <option value="אחר">אחר</option>
        </select>
      </div>
      <div class="field">
        <label>פירוט הסיבה</label>
        <textarea id="m_reason" placeholder="לדוגמה מחליף את דנה שיצאה לחופשת לידה ברעננה אשר"></textarea>
      </div>
      <div class="field">
        <label>תאריך מעבר</label>
        <input id="m_date" type="date"/>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-primary" onclick="saveMove()">בצע העברה</button>
      <button class="btn btn-ghost" onclick="closeMove()">ביטול</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   E-ZONE — ניהול כוח אדם (פרוטוטיפ)
   נתונים נשמרים מקומית בדפדפן. שלב הבא: חיבור ל-Google Sheets.
   שימוש בלעדי: מורן, משאבי אנוש.
   ============================================================ */

const HOUSES = [
  {id:'ramot',   name:'רמות השבים',    mgr:'שחר'},
  {id:'asher',   name:'רעננה אשר',     mgr:'עידו'},
  {id:'ofroni',  name:'קיסריה עפרוני', mgr:'חנן'},
  {id:'rehab',   name:'קיסריה ריהאב',  mgr:'רנטה'},
];

const SEED = {
  ramot:[
    {id:'e1', name:'שחר לוי',    role:'מנהל בית', salary:24000, pct:100, notes:''},
    {id:'e2', name:'מירב כהן',   role:'אחות',     salary:18000, pct:100, notes:''},
    {id:'e3', name:'יוסי אברהם', role:'מטפל',     salary:12000, pct:80,  notes:''},
  ],
  asher:[
    {id:'e4', name:'עידו ברק',   role:'מנהל בית', salary:23000, pct:100, notes:''},
    {id:'e5', name:'נעה שרון',   role:'מטפלת',    salary:11500, pct:75,  notes:''},
  ],
  ofroni:[
    {id:'e6', name:'חנן מזרחי',  role:'מנהל בית', salary:23500, pct:100, notes:''},
    {id:'e7', name:'דנה פרץ',    role:'מטבח',     salary:9000,  pct:60,  notes:''},
  ],
  rehab:[
    {id:'e8', name:'רנטה גורן',  role:'מנהלת בית',salary:24000, pct:100, notes:''},
  ],
};

let DATA, HISTORY, view='central', editId=null, moveId=null, moveFrom=null;

function load(){
  try{
    const d=JSON.parse(localStorage.getItem('ezone_staff_v1'));
    const h=JSON.parse(localStorage.getItem('ezone_staff_hist_v1'));
    DATA = d || JSON.parse(JSON.stringify(SEED));
    HISTORY = h || [];
  }catch(e){
    DATA=JSON.parse(JSON.stringify(SEED)); HISTORY=[];
  }
}
function save(){
  localStorage.setItem('ezone_staff_v1', JSON.stringify(DATA));
  localStorage.setItem('ezone_staff_hist_v1', JSON.stringify(HISTORY));
}

const fmt = n => '₪'+Number(n||0).toLocaleString('he-IL');
const houseName = id => (HOUSES.find(h=>h.id===id)||{}).name||id;
const houseMgr  = id => (HOUSES.find(h=>h.id===id)||{}).mgr||'';
function cost(emp){ return Math.round(emp.salary*(emp.pct/100)); }
function houseCost(id){ return (DATA[id]||[]).reduce((s,e)=>s+cost(e),0); }
function houseCount(id){ return (DATA[id]||[]).length; }
function totalCost(){ return HOUSES.reduce((s,h)=>s+houseCost(h.id),0); }
function totalCount(){ return HOUSES.reduce((s,h)=>s+houseCount(h.id),0); }

function renderSwitch(){
  const el=document.getElementById('houseSwitch');
  let html=`<button class="central ${view==='central'?'on':''}" onclick="go('central')">מבט כללי</button>`;
  HOUSES.forEach(h=>{
    html+=`<button class="${view===h.id?'on':''}" onclick="go('${h.id}')">${h.name}</button>`;
  });
  el.innerHTML=html;
}
function go(v){ view=v; render(); window.scrollTo(0,0); }

function render(){
  renderSwitch();
  const app=document.getElementById('app');
  app.innerHTML = view==='central' ? centralView() : houseView(view);
}

function centralView(){
  const recentMoves = HISTORY.slice().reverse();
  let houseBoxes = HOUSES.map(h=>`
    <div class="house-box" onclick="go('${h.id}')">
      <div class="hb-top">
        <b>${h.name}</b>
        <span class="hb-mgr">מנהל: ${h.mgr}</span>
      </div>
      <div class="hb-stats">
        <div><div class="n">${houseCount(h.id)}</div><div class="t">עובדים</div></div>
        <div><div class="n">${fmt(houseCost(h.id))}</div><div class="t">עלות חודשית</div></div>
      </div>
    </div>`).join('');

  let histHtml = recentMoves.length ? recentMoves.map(m=>`
    <div class="hist-item">
      <div class="hist-dot"></div>
      <div class="hist-body">
        <b>${m.name}</b> הועבר/ה
        <span class="hist-arrow">מ${houseName(m.from)} ל${houseName(m.to)}</span>
        <div class="hist-meta">${m.date} · ${m.reasonType}</div>
        ${m.reason?`<div class="hist-reason">${m.reason}</div>`:''}
      </div>
    </div>`).join('') : `<div class="empty">עדיין לא בוצעו העברות</div>`;

  return `
  <div class="head">
    <h1>מבט כללי — כל הבתים</h1>
    <p>תמונת מצב מרכזת של מצבת כוח האדם בכל הבתים. ניהול בלעדי — מורן, משאבי אנוש.</p>
  </div>

  <div class="stats">
    <div class="stat accent">
      <div class="lbl">סה״כ עובדים</div>
      <div class="val">${totalCount()}</div>
      <div class="sub">בכל הרשת</div>
    </div>
    <div class="stat">
      <div class="lbl">עלות שכר חודשית</div>
      <div class="val">${fmt(totalCost())}</div>
      <div class="sub">ברוטו · משוקלל לחלקיות</div>
    </div>
    <div class="stat">
      <div class="lbl">בתים פעילים</div>
      <div class="val">${HOUSES.length}</div>
      <div class="sub">רמות · אשר · עפרוני · ריהאב</div>
    </div>
    <div class="stat">
      <div class="lbl">העברות שבוצעו</div>
      <div class="val">${HISTORY.length}</div>
      <div class="sub">לאורך כל ההיסטוריה</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head"><h2>פירוט לפי בית</h2></div>
    <div class="house-grid">${houseBoxes}</div>
  </div>

  <div class="section">
    <div class="section-head"><h2>היסטוריית העברות</h2></div>
    <div class="tablecard" style="padding:8px 22px">${histHtml}</div>
  </div>`;
}

function houseView(id){
  const list=DATA[id]||[];
  const rows = list.length ? list.map(e=>{
    const isCover = (e.notes||'').includes('כיסוי') || (e.notes||'').includes('מחליף') || (e.notes||'').includes('מחליפה');
    return `
    <tr>
      <td class="emp-name">${e.name}</td>
      <td><span class="role-tag">${e.role||'—'}</span></td>
      <td class="money">${fmt(e.salary)}</td>
      <td>
        <div class="pct-bar">
          <div class="pct-track"><div class="pct-fill" style="width:${e.pct}%"></div></div>
          <span style="font-size:13px;font-weight:600">${e.pct}%</span>
        </div>
      </td>
      <td class="money">${fmt(cost(e))}</td>
      <td class="note-cell">${e.notes||'<span style="color:#B6B0A0">—</span>'}${isCover?'<span class="cover-flag">כיסוי</span>':''}</td>
      <td>
        <div class="row-actions">
          <button class="btn btn-sm" onclick="openMove('${id}','${e.id}')">העבר</button>
          <button class="btn btn-sm" onclick="openEmp('${id}','${e.id}')">ערוך</button>
          <button class="btn btn-sm btn-ghost" onclick="delEmp('${id}','${e.id}')">מחק</button>
        </div>
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="7"><div class="empty">אין עובדים בבית זה. לחצי "הוסף עובד" כדי להתחיל.</div></td></tr>`;

  return `
  <div class="head">
    <h1>${houseName(id)}</h1>
    <p>מצבת עובדים, שכר ברוטו וחלקיות משרה</p>
    <span class="mgr">מנהל הבית: ${houseMgr(id)}</span>
  </div>

  <div class="stats">
    <div class="stat accent">
      <div class="lbl">עובדים בבית</div>
      <div class="val">${houseCount(id)}</div>
    </div>
    <div class="stat">
      <div class="lbl">עלות שכר חודשית</div>
      <div class="val">${fmt(houseCost(id))}</div>
      <div class="sub">משוקלל לחלקיות משרה</div>
    </div>
    <div class="stat">
      <div class="lbl">סה״כ ברוטו במשרה מלאה</div>
      <div class="val">${fmt((DATA[id]||[]).reduce((s,e)=>s+Number(e.salary||0),0))}</div>
      <div class="sub">ללא שקלול חלקיות</div>
    </div>
    <div class="stat">
      <div class="lbl">חלקיות ממוצעת</div>
      <div class="val">${houseCount(id)?Math.round((DATA[id].reduce((s,e)=>s+e.pct,0)/houseCount(id))):0}%</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <h2>מצבת עובדים</h2>
      <button class="btn btn-primary" onclick="openEmp('${id}')">+ הוסף עובד</button>
    </div>
    <div class="tablecard">
      <div class="table-scroll">
      <table>
        <thead><tr>
          <th>שם</th><th>תפקיד</th><th>שכר ברוטו</th><th>חלקיות</th>
          <th>עלות בפועל</th><th>הערות</th><th>פעולות</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>
  </div>`;
}

function openEmp(houseId, empId){
  editId = empId ? {houseId,empId} : {houseId};
  const isEdit = !!empId;
  document.getElementById('empModalTitle').textContent = isEdit?'עריכת עובד':'עובד חדש';
  document.getElementById('empModalSub').textContent = houseName(houseId);
  let e = {name:'',role:'',salary:'',pct:100,notes:''};
  if(isEdit){ e = (DATA[houseId]||[]).find(x=>x.id===empId)||e; }
  f_name.value=e.name; f_role.value=e.role;
  f_salary.value=e.salary; f_pct.value=e.pct; f_notes.value=e.notes||'';
  document.getElementById('empOverlay').classList.add('show');
}
function closeEmp(){ document.getElementById('empOverlay').classList.remove('show'); }
function saveEmp(){
  const {houseId,empId}=editId;
  const obj={
    name:f_name.value.trim(),
    role:f_role.value.trim(),
    salary:Number(f_salary.value)||0,
    pct:Math.min(100,Math.max(1,Number(f_pct.value)||100)),
    notes:f_notes.value.trim()
  };
  if(!obj.name){ alert('יש להזין שם'); return; }
  if(empId){
    const arr=DATA[houseId]; const i=arr.findIndex(x=>x.id===empId);
    arr[i]={...arr[i],...obj};
  }else{
    obj.id='e'+Date.now();
    (DATA[houseId]=DATA[houseId]||[]).push(obj);
  }
  save(); closeEmp(); render();
}
function delEmp(houseId,empId){
  if(!confirm('למחוק את העובד מהמערכת?')) return;
  DATA[houseId]=DATA[houseId].filter(x=>x.id!==empId);
  save(); render();
}

function openMove(houseId, empId){
  moveId=empId; moveFrom=houseId;
  const e=(DATA[houseId]||[]).find(x=>x.id===empId);
  document.getElementById('moveModalSub').textContent =
    `${e.name} · כרגע ב${houseName(houseId)}`;
  const sel=document.getElementById('m_house');
  sel.innerHTML=HOUSES.filter(h=>h.id!==houseId)
    .map(h=>`<option value="${h.id}">${h.name} · מנהל ${h.mgr}</option>`).join('');
  document.getElementById('m_reasonType').value='כיסוי חוסר';
  document.getElementById('m_reason').value='';
  document.getElementById('m_date').value=new Date().toISOString().slice(0,10);
  document.getElementById('moveOverlay').classList.add('show');
}
function closeMove(){ document.getElementById('moveOverlay').classList.remove('show'); }
function saveMove(){
  const toHouse=document.getElementById('m_house').value;
  const reasonType=document.getElementById('m_reasonType').value;
  const reason=document.getElementById('m_reason').value.trim();
  const date=document.getElementById('m_date').value||new Date().toISOString().slice(0,10);
  const arr=DATA[moveFrom]; const i=arr.findIndex(x=>x.id===moveId);
  const emp=arr[i];
  arr.splice(i,1);
  (DATA[toHouse]=DATA[toHouse]||[]).push(emp);
  HISTORY.push({
    name:emp.name, from:moveFrom, to:toHouse,
    reasonType, reason, date
  });
  save(); closeMove(); view=toHouse; render(); window.scrollTo(0,0);
}

load(); render();
</script>
</body>

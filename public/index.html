# Frontend patch — `public/index.html`

Fragments to merge into the existing worker form. Not a whole-file replacement.

---

## 1. Load the shared lib

With the other `<script src>` tags, **before** the inline script:

```html
<script src="/lib/shift-compliance.js"></script>
```

Exposes `window.ShiftCompliance`. It's namespaced deliberately — bare `const`
globals colliding with inline `<script>` declarations is the blank-page bug
class from `calcCost` / `calcToday`. Do not destructure it into globals.

Confirm `server.js` already serves `/lib` statically. If it doesn't:

```js
app.use('/lib', express.static(path.join(__dirname, 'lib')));
```

---

## 2. The select — in the add/edit worker form

Hebrew labels, ASCII values. The stored value never contains Hebrew, so Sheet
exports and CSV round-trips stay clean. No parentheses in the Hebrew strings.

```html
<div class="field" id="fld-shift-commitment">
  <label for="shift_commitment">התחייבות משמרות שבועית</label>
  <select id="shift_commitment" name="shift_commitment">
    <option value="">ללא התחייבות</option>
    <option value="3+1">3 משמרות באמצע השבוע + 1 בסופ״ש</option>
    <option value="4+1">4 משמרות באמצע השבוע + 1 בסופ״ש</option>
    <option value="5+1">5 משמרות באמצע השבוע + 1 בסופ״ש</option>
  </select>
  <small class="hint">רלוונטי למדריכים בלבד</small>
</div>
```

Note `״` is the Hebrew gershayim, not a straight ASCII quote — it renders
correctly RTL and won't break the attribute.

## 3. Show only for instructor-type workers

Wire to the existing employment-type change handler:

```js
function toggleShiftCommitmentField() {
  var type = document.getElementById('employment_type').value;
  var show = (type === 'hourly' || type === 'per_session');
  document.getElementById('fld-shift-commitment').style.display = show ? '' : 'none';
  if (!show) document.getElementById('shift_commitment').value = '';
}
```

Call it on form open and on `employment_type` change.

> **Check this against reality.** I'm assuming מדריכים are `hourly` or
> `per_session`. If they're typed differently in the live sheet, fix the
> condition — or drop the toggle and always show the field. Getting this wrong
> means Moran can't find the select.

## 5. Include on save

Where the payload is assembled:

```js
payload.shift_commitment = document.getElementById('shift_commitment').value || '';
```

Client-side check before POST, mirroring the server:

```js
var sc = window.ShiftCompliance;
var val = payload.shift_commitment;
if (val && sc.COMMITMENT_VALUES.indexOf(val) === -1) {
  showError('התחייבות משמרות לא תקינה');
  return;
}
```

The server throws on bad values regardless. This is UX, not security.

## 7. The alert — build the slot, leave it dark

The red flag has nothing to compute against until the scheduling app exists and
starts serving blocks. `instructorAlert` returns `null` with no blocks, by
design, so this is safe to ship now and it lights up on its own later.

```js
/**
 * Renders the shift-commitment alert on a worker card.
 * Dark until the scheduling app serves real blocks.
 *
 * @param {object} worker
 * @param {string[]} blocked ISO dates from the scheduling app. Empty until wired.
 */
function renderCommitmentAlert(worker, blocked) {
  var sc = window.ShiftCompliance;
  var now = new Date();
  var alert = sc.instructorAlert(worker, now.getFullYear(), now.getMonth() + 1, blocked || []);
  if (!alert) return '';

  var weeks = alert.failingWeeks.length;
  return '<div class="alert alert-commitment" title="' + weeks + ' שבועות בעיה">' +
         '⚠ לא ניתן לשבץ לפי ההתחייבות' +
         '</div>';
}
```

Wire `blocked` to the scheduling app's read endpoint when that ships. Until
then it's called with `[]` and renders nothing.

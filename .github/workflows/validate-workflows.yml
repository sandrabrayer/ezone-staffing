name: Validate Workflows

# Cheap guard so a malformed workflow file (bad indentation, unclosed quote,
# duplicate key) can never merge silently. Runs on any PR or push that touches
# .github/workflows/**. Pure syntactic YAML parse via js-yaml — no committed deps.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  yaml:
    name: Parse workflow YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate every workflow file parses
        run: |
          shopt -s nullglob
          files=(.github/workflows/*.yml .github/workflows/*.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No workflow files found to validate."
            exit 1
          fi
          echo "Validating ${#files[@]} workflow file(s)…"
          fail=0
          for f in "${files[@]}"; do
            if npx --yes js-yaml "$f" > /dev/null; then
              echo "  ok  $f"
            else
              echo "::error file=$f::Invalid YAML in $f"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "All workflow YAML is valid." || exit 1
